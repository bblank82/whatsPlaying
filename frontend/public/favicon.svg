<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#000"/>
  <!-- Geometric play icon — 5 facets matching the logo -->
  <!-- Top-left facet (teal) -->
  <polygon points="7,4 7,16 13,14 13,9" fill="#4ADBB8"/>
  <!-- Bottom-left facet (lime) -->
  <polygon points="7,16 7,28 13,23 13,18" fill="#86C81E"/>
  <!-- Top-right facet (bright green) -->
  <polygon points="13,9 13,14 15,16 25,16" fill="#62CF2C"/>
  <!-- Bottom-right facet (yellow-green) -->
  <polygon points="13,18 13,23 25,16 15,16" fill="#96C408"/>
  <!-- Centre facet (medium green) -->
  <polygon points="13,14 13,18 15,16" fill="#72C826"/>
</svg>
